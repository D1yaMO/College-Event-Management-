<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venue Navigation | CDG</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/globals.css">
  <style>
    body { padding: 40px; background: var(--bg-dark); }
    .container { max-width: 1000px; margin: 60px auto; }
    .back-btn { position: fixed; top: 30px; left: 30px; color: var(--text-muted); font-size: 1.5rem; transition: 0.3s; z-index: 100; }
    .back-btn:hover { color: var(--primary); transform: translateX(-5px); }
    
    .navigation-card { padding: 2.5rem; }
    .map-container {
      width: 100%;
      height: 450px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border-color);
      margin: 2rem 0;
    }
    .map-container iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }
    .venue-details {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-top: 1.5rem;
    }
    .venue-item {
      padding: 1rem;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      border: 1px solid var(--border-color);
    }
    .venue-item i { color: var(--primary); margin-bottom: 0.5rem; display: block; }
    .venue-item h4 { font-size: 0.9rem; font-weight: 700; margin-bottom: 0.25rem; }
    .venue-item p { font-size: 0.85rem; color: var(--text-muted); }
  </style>
</head>

<a href="student_dashboard.php" class="back-btn"><i class="fas fa-arrow-left"></i></a>

<div class="container">
  <h1 style="margin-bottom: 2.5rem; font-weight: 800; text-align: center;">Venue Navigation</h1>
  
  <div class="glass-card navigation-card">
    <div style="display: flex; justify-content: space-between; align-items: flex-end;">
      <div>
        <h2 style="font-weight: 800; color: var(--primary);">Main Auditorium</h2>
        <p style="color: var(--text-muted); margin-top: 0.25rem;">MVJ College of Engineering, Bangalore</p>
      </div>
      <button class="btn btn-primary" onclick="window.open('https://maps.app.goo.gl/35535535535535535', '_blank')">
        <i class="fas fa-directions"></i> Get Directions
      </button>
    </div>

    <div class="map-container">
      <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3887.8286915174415!2d77.7479707!3d12.982181!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bae11e2f3a677ef%3A0x6b777a873117565d!2sMVJ%20College%20of%20Engineering!5e0!3m2!1sen!2sin!4v1711468800000!5m2!1sen!2sin" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>

    <div class="venue-details">
      <div class="venue-item">
        <i class="fas fa-map-marker-alt"></i>
        <h4>Block 4, 3rd Floor</h4>
        <p>Main Building, Entrance B</p>
      </div>
      <div class="venue-item">
        <i class="fas fa-walking"></i>
        <h4>10 min walk</h4>
        <p>From College Main Gate</p>
      </div>
      <div class="venue-item">
        <i class="fas fa-parking"></i>
        <h4>Parking Available</h4>
        <p>Near Sports Ground</p>
      </div>
    </div>
  </div>
</div>

</body>
</html>
