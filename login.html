<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login / Signup | MVJCE Event System</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/globals.css">
<style>
  body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .bg-video {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
    filter: brightness(0.3);
  }

  .login-card {
    width: 100%;
    max-width: 450px;
    padding: 3rem;
    animation: fadeIn 0.6s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo-text {
    font-size: 2rem;
    font-weight: 800;
    color: var(--primary);
    text-align: center;
    margin-bottom: 2rem;
  }

  .tabs {
    display: flex;
    gap: 1rem;
    margin-bottom: 2rem;
    background: rgba(255, 255, 255, 0.05);
    padding: 0.5rem;
    border-radius: 12px;
  }

  .tab {
    flex: 1;
    padding: 0.75rem;
    text-align: center;
    cursor: pointer;
    border-radius: 8px;
    font-weight: 600;
    transition: 0.3s;
    color: var(--text-muted);
  }

  .tab.active {
    background: var(--primary);
    color: #fff;
  }

  form {
    display: none;
    flex-direction: column;
    gap: 1.25rem;
  }

  form.active {
    display: flex;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .form-group label {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text-muted);
  }

  .back-home {
    margin-top: 1.5rem;
    text-align: center;
    font-size: 0.9rem;
    color: var(--text-muted);
  }

  .back-home a:hover {
    color: var(--primary);
  }
</style>
</head>
<body>

<video autoplay muted loop class="bg-video">
  <source src="assets/video_3.mp4" type="video/mp4">
</video>

<div class="glass-card login-card">
  <div class="logo-text">CDG</div>
  
  <div class="tabs">
    <div class="tab active" id="loginTab">Login</div>
    <div class="tab" id="signupTab">Sign Up</div>
  </div>

  <form id="loginForm" class="active" action="login.php" method="POST">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" name="email" placeholder="name@example.com" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" required>
    </div>
    <div class="form-group">
      <label>Role</label>
      <select name="role" required>
        <option value="">Select your role</option>
        <option value="student">Student</option>
        <option value="faculty">Faculty</option>
        <option value="club_admin">Club Admin</option>
      </select>
    </div>
    <button type="submit" class="btn btn-primary" style="padding: 0.8rem;">Login to Account</button>
  </form>

  <form id="signupForm" action="register.php" method="POST">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" name="name" placeholder="John Doe" required>
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" name="email" placeholder="name@example.com" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="Min. 6 characters" required>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" name="confirm_password" placeholder="••••••••" required>
    </div>
    <input type="hidden" name="role" value="student">
    <button type="submit" class="btn btn-primary" style="padding: 0.8rem;">Create Student Account</button>
  </form>

  <div class="back-home">
    <a href="index.html">← Back to home</a>
  </div>
</div>

<script>
  const loginTab = document.getElementById('loginTab');
  const signupTab = document.getElementById('signupTab');
  const loginForm = document.getElementById('loginForm');
  const signupForm = document.getElementById('signupForm');

  loginTab.addEventListener('click', () => {
    loginTab.classList.add('active');
    signupTab.classList.remove('active');
    loginForm.classList.add('active');
    signupForm.classList.remove('active');
  });

  signupTab.addEventListener('click', () => {
    signupTab.classList.add('active');
    loginTab.classList.remove('active');
    signupForm.classList.add('active');
    loginForm.classList.remove('active');
  });
</script>

</body>
</html>
